<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hub Beyond Numbers | Obsidian Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,500;0,700;1,400&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0b;
            --surface: rgba(18, 18, 20, 0.98);
            --card-bg: linear-gradient(145deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.01) 100%);
            --accent: #d4af37;
            --accent-soft: rgba(212,175,55,0.15);
            --text: #f8f8f8;
            --text-dim: #a0a0a5;
            --border: rgba(255,255,255,0.08);
            --font-serif: 'Cormorant Garamond', serif;
            --font-sans: 'Inter', sans-serif;
            --transition: all 0.5s cubic-bezier(0.2,1,0.2,1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        body { background-color: var(--bg); color: var(--text); font-family: var(--font-sans); min-height: 100vh; overflow-x: hidden; }
        .ambient { position: fixed; top:0; left:0; width:100%; height:100%; background: radial-gradient(circle at 50% -20%, #1a1a1e 0%, transparent 50%); z-index:-1; }
        .sidebar { width:300px; background:var(--surface); backdrop-filter:blur(40px); border-right:1px solid var(--border); height:100vh; position:fixed; left:0; top:0; padding:4rem 2rem; display:flex; flex-direction:column; z-index:100; transition:var(--transition); }
        @media (max-width:1024px) { .sidebar { transform:translateX(-100%); } .sidebar.open { transform:translateX(0); box-shadow:20px 0 100px rgba(0,0,0,0.9); } }
        .logo { font-family:var(--font-serif); font-size:2.2rem; font-weight:300; margin-bottom:5rem; letter-spacing:-1px; color:var(--text); }
        .logo b { font-weight:700; color:var(--accent); }
        .logo span { display:block; font-size:0.7rem; letter-spacing:5px; text-transform:uppercase; font-family:var(--font-sans); margin-top:8px; color:var(--text-dim); }
        .nav-item { padding:16px 24px; border-radius:12px; cursor:pointer; color:var(--text-dim); margin-bottom:8px; transition:var(--transition); font-size:1rem; display:flex; align-items:center; gap:15px; }
        .nav-item:hover { color:var(--text); background:rgba(255,255,255,0.03); }
        .nav-item.active { background:var(--accent-soft); color:var(--accent); font-weight:600; }
        .viewport { padding:6rem 10% 8rem; margin-left:300px; transition:var(--transition); }
        @media (max-width:1024px) { .viewport { margin-left:0; padding:5rem 6% 6rem; } }
        .heading-group h1 { font-family:var(--font-serif); font-size:clamp(3.5rem,8vw,7rem); font-weight:300; font-style:italic; margin-bottom:0.5rem; line-height:0.8; letter-spacing:-2px; }
        .tabs { display:flex; gap:30px; margin:3rem 0; border-bottom:1px solid var(--border); padding-bottom:1rem; }
        .tab { cursor:pointer; color:var(--text-dim); font-size:0.9rem; text-transform:uppercase; letter-spacing:2px; transition:var(--transition); position:relative; }
        .tab.active { color:var(--accent); font-weight:800; }
        .tab.active::after { content:''; position:absolute; bottom:-1rem; left:0; width:100%; height:2px; background:var(--accent); }
        .grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:3rem; }
        .card { background:var(--card-bg); border:1px solid var(--border); border-radius:2px; padding:4rem 3rem; transition:var(--transition); cursor:pointer; position:relative; overflow:hidden; }
        .card::before { content:''; position:absolute; top:0; left:0; width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--accent),transparent); transform:translateX(-100%); transition:0.6s; }
        .card:hover { border-color:var(--accent); transform:translateY(-5px); }
        .card:hover::before { transform:translateX(100%); }
        .card h3 { font-family:var(--font-serif); font-size:4rem; font-weight:300; margin-bottom:1rem; }
        .card .btn-label { font-size:0.7rem; letter-spacing:3px; text-transform:uppercase; color:var(--accent); font-weight:800; }
        .mobile-header { display:none; position:fixed; top:0; left:0; width:100%; background:var(--bg); padding:1.5rem 2rem; z-index:110; border-bottom:1px solid var(--border); justify-content:space-between; align-items:center; }
        @media (max-width:1024px) { .mobile-header { display:flex; } }
        #quiz-overlay { position:fixed; inset:0; background:var(--bg); z-index:2000; display:none; flex-direction:column; overflow-y:auto; }
        .quiz-top { padding:2rem 5%; border-bottom:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; background:var(--surface); position:sticky; top:0; z-index:10; flex-wrap:wrap; gap:1rem; }
        .progress-bar { width:200px; height:2px; background:var(--border); border-radius:2px; margin-top:8px; }
        .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.4s ease; }
        .quiz-container { max-width:900px; margin:4rem auto; padding:0 2rem; }
        .question-box { margin-bottom:5rem; }
        .q-num { font-family:var(--font-serif); font-size:1.5rem; color:var(--accent); margin-bottom:0.5rem; display:block; }
        .q-badge { display:inline-block; font-size:0.6rem; letter-spacing:2px; text-transform:uppercase; background:var(--accent-soft); color:var(--accent); padding:3px 10px; border-radius:2px; margin-bottom:1.2rem; }
        .q-text { font-family:var(--font-serif); font-size:2rem; line-height:1.3; margin-bottom:2.5rem; font-weight:400; }
        .options-list { display:grid; gap:12px; }
        .option-btn { background:transparent; border:1px solid var(--border); padding:18px 28px; text-align:left; color:var(--text); font-family:var(--font-sans); font-size:1rem; cursor:pointer; transition:var(--transition); display:flex; align-items:center; gap:15px; border-radius:4px; }
        .option-btn:hover:not(:disabled) { border-color:var(--accent); background:var(--accent-soft); }
        .option-btn.selected { background:var(--accent-soft); border-color:var(--accent); }
        .option-btn.correct { background:rgba(52,199,89,0.15); border-color:#34c759; }
        .option-btn.correct .opt-letter { color:#34c759; }
        .option-btn.wrong { background:rgba(255,59,48,0.15); border-color:#ff3b30; }
        .option-btn.wrong .opt-letter { color:#ff3b30; }
        .option-btn:disabled { cursor:default; }
        .opt-letter { font-weight:800; color:var(--accent); min-width:24px; font-size:0.9rem; letter-spacing:1px; }
        .btn-confirm { display:none; margin-top:1.5rem; background:var(--accent); border:none; color:#000; padding:12px 32px; font-size:0.75rem; letter-spacing:2px; cursor:pointer; text-transform:uppercase; font-weight:800; border-radius:2px; }
        .close-quiz { background:transparent; border:1px solid var(--accent); color:var(--accent); padding:10px 30px; font-size:0.8rem; letter-spacing:2px; cursor:pointer; text-transform:uppercase; }
        .score-panel { display:none; max-width:700px; margin:6rem auto 4rem; padding:4rem; border:1px solid var(--border); text-align:center; }
        .score-panel .big-score { font-family:var(--font-serif); font-size:6rem; color:var(--accent); font-weight:300; line-height:1; }
        .score-panel .score-msg { color:var(--text-dim); margin-top:1rem; letter-spacing:2px; font-size:0.8rem; text-transform:uppercase; }
        .score-breakdown { display:grid; grid-template-columns:1fr 1fr 1fr; gap:2rem; margin:3rem 0; }
        .score-stat { border:1px solid var(--border); padding:2rem 1rem; }
        .score-stat .val { font-family:var(--font-serif); font-size:3rem; font-weight:300; }
        .score-stat .lbl { font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; color:var(--text-dim); margin-top:0.5rem; }
        .score-stat.good .val { color:#34c759; }
        .score-stat.bad .val { color:#ff3b30; }
        .mask { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:90; }
        .mask.active { display:block; }
    </style>
</head>
<body>
<div class="ambient"></div>
<div class="mask" id="mask" onclick="toggleMenu()"></div>
<div class="mobile-header">
    <div class="logo" style="margin:0;font-size:1.5rem;">Hub <b>Beyond</b></div>
    <button style="background:none;border:none;color:#fff;font-size:1.5rem;" onclick="toggleMenu()">MENU</button>
</div>
<aside class="sidebar" id="sidebar">
    <div class="logo">Hub <b>Beyond</b><span>Numbers</span></div>
    <nav id="grade-nav"></nav>
</aside>
<main class="viewport">
    <div class="heading-group">
        <p style="color:var(--accent);letter-spacing:5px;font-size:0.7rem;font-weight:800;text-transform:uppercase;margin-bottom:1rem;">Official Question Bank</p>
        <h1 id="view-title">Basic 5</h1>
    </div>
    <div class="tabs">
        <div class="tab active" onclick="setTrial(1,this)">Trial I</div>
        <div class="tab" onclick="setTrial(2,this)">Trial II</div>
        <div class="tab" onclick="setTrial(3,this)">Trial III</div>
    </div>
    <div class="grid" id="card-grid"></div>
</main>
<div id="quiz-overlay">
    <div class="quiz-top">
        <div>
            <h2 id="quiz-title" style="font-family:var(--font-serif);font-size:2rem;">Assessment</h2>
            <p id="quiz-meta" style="font-size:0.7rem;letter-spacing:2px;color:var(--text-dim);text-transform:uppercase;"></p>
            <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:0%"></div></div>
        </div>
        <div style="display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;">
            <div id="live-score-box" style="text-align:center;display:none;">
                <div id="live-pct" style="font-family:var(--font-serif);font-size:2.8rem;font-weight:300;line-height:1;color:var(--accent);">0%</div>
                <div style="font-size:0.6rem;letter-spacing:3px;text-transform:uppercase;color:var(--text-dim);margin-top:4px;">Live Score</div>
                <div id="live-fraction" style="font-size:0.7rem;color:var(--text-dim);margin-top:2px;">0 / 0</div>
            </div>
            <button class="close-quiz" onclick="closeQuiz()">End Session</button>
        </div>
    </div>
    <div class="quiz-container" id="quiz-content"></div>
    <div class="score-panel" id="score-panel">
        <p style="color:var(--accent);letter-spacing:5px;font-size:0.7rem;font-weight:800;margin-bottom:1.5rem;">SESSION RESULTS</p>
        <div class="big-score" id="score-val">0/40</div>
        <p class="score-msg" id="score-msg">Complete</p>
        <div class="score-breakdown">
            <div class="score-stat good"><div class="val" id="stat-correct">0</div><div class="lbl">Correct</div></div>
            <div class="score-stat bad"><div class="val" id="stat-wrong">0</div><div class="lbl">Incorrect</div></div>
            <div class="score-stat"><div class="val" id="stat-pct">0%</div><div class="lbl">Score</div></div>
        </div>
        <button class="close-quiz" onclick="closeQuiz()">Close Session</button>
    </div>
</div>
<script>
const questionBank = {
  basic5: {
    1: [

      {q:"Which is the largest integer: −10, −1, 0, 5?", opts:["−10","−1","0","5"], ans:3, topic:"Numbers"},
      {q:"What is 98 × 7?", opts:["676","686","696","706"], ans:1, topic:"Numbers"},
      {q:"What are the first three multiples of 9?", opts:["9, 18, 27","9, 19, 29","3, 6, 9","18, 27, 36"], ans:0, topic:"Numbers"},
      {q:"On a number line, what is 10 + (−4)?", opts:["14","6","−6","−14"], ans:1, topic:"Numbers"},

      {q:"Write \"Sum of 12 and k\" as an algebraic expression.", opts:["12k","k − 12","12 + k","k ÷ 12"], ans:2, topic:"Algebra"},
      {q:"Translate \"7 times g\" into algebra.", opts:["7 + g","7g","g − 7","7 ÷ g"], ans:1, topic:"Algebra"},
      {q:"Simplify: m + 5m + m.", opts:["6m","7m","5m","7"], ans:1, topic:"Algebra"},
      {q:"Simplify: 10x − 4x.", opts:["14x","6","6x","4x"], ans:2, topic:"Algebra"},
      {q:"Evaluate b + 15 when b = 5.", opts:["10","20","155","75"], ans:1, topic:"Algebra"},
      {q:"What is the perimeter formula for a rectangle with length L and width W?", opts:["L + W","L × W","2(L + W)","L − W"], ans:2, topic:"Algebra"},
      {q:"Group like terms: 5 + 2a − 1 + 3a.", opts:["5a + b","6a − 1","4 + 5a","9a"], ans:2, topic:"Algebra"},

      {q:"Simplify: 4p + 3 − p + 7.", opts:["3p + 10","5p + 10","4p + 10","3p + 4"], ans:0, topic:"Algebra"},

      {q:"What is the perimeter of an equilateral triangle with sides of 5 cm each?", opts:["10 cm","15 cm","25 cm","20 cm"], ans:1, topic:"Measurement"},

      {q:"A rectangle is 8 cm long and 3 cm wide. What is its perimeter?", opts:["22 cm","24 cm","11 cm","22 cm²"], ans:0, topic:"Measurement"},
      {q:"A rectangle is 6 cm long and 4 cm wide. What is its area?", opts:["20 cm²","24 cm²","10 cm","24 cm"], ans:1, topic:"Measurement"},
      {q:"A cube has edges of 3 cm each. What is its volume?", opts:["9 cm³","18 cm³","27 cm³","12 cm³"], ans:2, topic:"Measurement"},
      // CHANCE (10) — Trial 1: impossible/certain/possible/unlikely vocabulary, basic language questions
      {q:"In a Ludo game, the chance of rolling a \"7\" on one die is:", opts:["Possible","Likely","Certain","Impossible"], ans:3, topic:"Chance"},
      {q:"Picking a green ball from a bag of ONLY green balls is:", opts:["Impossible","Possible","Certain","Unlikely"], ans:2, topic:"Chance"},
      {q:"A bag has 10 Red and 1 Pink bottle top. Picking Pink is:", opts:["Likely","Unlikely","Certain","Impossible"], ans:1, topic:"Chance"},
      {q:"Tossing a coin and getting Tails is:", opts:["Certain","Impossible","Possible","Unlikely"], ans:2, topic:"Chance"},
      {q:"If it is sunny today, it is ________ that it will be sunny tomorrow.", opts:["Possible","Impossible","Certain","Zero"], ans:0, topic:"Chance"},

      {q:"A \"Certain\" event has a probability of:", opts:["0%","50%","75%","100%"], ans:3, topic:"Chance"},

      {q:"What is the probability of an impossible event?", opts:["1","0.5","0","100%"], ans:2, topic:"Chance"},
      {q:"In a bag of 8 Yellow and 2 Blue tops, picking Yellow is:", opts:["Unlikely","Equally Likely","Likely","Certain"], ans:2, topic:"Chance"},

      {q:"What is 9 × 9?", opts:["72","81","84","90"], ans:1, topic:"Numbers"},
      {q:"Use the 11s pattern to find 11 × 12.", opts:["122","132","142","112"], ans:1, topic:"Numbers"},

const grades = ['Basic 5','Basic 6','Basic 7','Basic 8','Basic 9'];
let currentGradeIdx = 0;
let currentTrial = 1;
let userAnswers = {};

function gradeKey(idx){ return grades[idx].toLowerCase().replace(' ',''); }
function initNav(){
  const nav = document.getElementById('grade-nav');
  nav.innerHTML = grades.map((g,i)=>`<div class="nav-item ${i===0?'active':''}" onclick="setGrade(${i},this)">${g}</div>`).join('');
}
function toggleMenu(){
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('mask').classList.toggle('active');
}
function setGrade(idx,el){
  currentGradeIdx=idx;
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('view-title').innerText=grades[idx];
  renderGrid();
  if(window.innerWidth<1024) toggleMenu();
}
function setTrial(num,el){
  currentTrial=num;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  renderGrid();
}
function hasQuestions(){
  const gk=gradeKey(currentGradeIdx);
  return questionBank[gk]&&questionBank[gk][currentTrial];
}
function renderGrid(){
  const grid=document.getElementById('card-grid');
  const ready=hasQuestions();
  const gk=gradeKey(currentGradeIdx);
  const qCount = ready ? questionBank[gk][currentTrial].length : 0;
  grid.innerHTML=`<div class="card" onclick="${ready?'startQuiz()':'alert(\"Questions coming soon!\")'}">
    <div class="btn-label">Academic Portfolio</div>
    <h3>T-${currentTrial}</h3>
    <p style="color:var(--text-dim);font-size:0.9rem;margin-top:0.5rem;">${ready?`Start ${qCount}-Question Interactive Session`:'Questions coming soon'}</p>
  </div>`;
}
function startQuiz(){
  const gk=gradeKey(currentGradeIdx);
  const questions=questionBank[gk]?.[currentTrial];
  if(!questions){alert('Questions coming soon!');return;}
  userAnswers={};
  const overlay=document.getElementById('quiz-overlay');
  const content=document.getElementById('quiz-content');
  document.getElementById('quiz-meta').innerText=`${grades[currentGradeIdx]} • Trial ${currentTrial} • ${questions.length} Questions`;
  document.getElementById('score-panel').style.display='none';
  document.getElementById('progress-fill').style.width='0%';
  document.getElementById('live-score-box').style.display='none';
  document.getElementById('live-pct').innerText='0%';
  document.getElementById('live-fraction').innerText='0 correct of 0 answered';
  let html='';let lastTopic='';
  questions.forEach((q,i)=>{
    const showBadge=q.topic!==lastTopic;lastTopic=q.topic;
    html+=`<div class="question-box" id="qbox-${i}">
      <span class="q-num">Question ${i+1}</span>
      ${showBadge?`<div class="q-badge">${q.topic}</div>`:''}
      <div class="q-text">${q.q}</div>
      <div class="options-list" id="opts-${i}">
        ${q.opts.map((opt,j)=>`<button class="option-btn" id="opt-${i}-${j}" onclick="selectOpt(${i},${j})">
          <span class="opt-letter">${['A','B','C','D'][j]}</span>${opt}
        </button>`).join('')}
      </div>
      <button class="btn-confirm" id="confirm-${i}" onclick="confirmAnswer(${i})">Confirm Answer</button>
    </div>`;
  });
  content.innerHTML=html;
  overlay.style.display='flex';
  document.body.style.overflow='hidden';
  overlay.scrollTop=0;
}
function selectOpt(qIdx,optIdx){
  if(userAnswers[qIdx]?.confirmed)return;
  const questions=getQuestions();
  questions[qIdx].opts.forEach((_,j)=>document.getElementById(`opt-${qIdx}-${j}`)?.classList.remove('selected'));
  document.getElementById(`opt-${qIdx}-${optIdx}`)?.classList.add('selected');
  userAnswers[qIdx]={chosen:optIdx,confirmed:false};
  document.getElementById(`confirm-${qIdx}`).style.display='inline-block';
}
function confirmAnswer(qIdx){
  if(userAnswers[qIdx]?.confirmed)return;
  const chosen=userAnswers[qIdx]?.chosen;
  if(chosen===undefined)return;
  const q=getQuestions()[qIdx];
  userAnswers[qIdx].confirmed=true;
  q.opts.forEach((_,j)=>{
    const btn=document.getElementById(`opt-${qIdx}-${j}`);
    btn.disabled=true;btn.classList.remove('selected');
    if(j===q.ans)btn.classList.add('correct');
    else if(j===chosen)btn.classList.add('wrong');
  });
  document.getElementById(`confirm-${qIdx}`).style.display='none';
  const total=getQuestions().length;
  const confirmed=Object.values(userAnswers).filter(a=>a.confirmed);
  const done=confirmed.length;
  const correct=confirmed.filter((a,i)=>{
    const qI=Object.keys(userAnswers).find(k=>userAnswers[k]===a);
    return userAnswers[qI].chosen===getQuestions()[qI].ans;
  }).length;
  // Count correct properly
  let correctCount=0;
  getQuestions().forEach((_,i)=>{
    if(userAnswers[i]?.confirmed && userAnswers[i].chosen===getQuestions()[i].ans) correctCount++;
  });
  const pct=done>0?Math.round(correctCount/done*100):0;
  // Update progress bar
  document.getElementById('progress-fill').style.width=(done/total*100)+'%';
  // Update meta text
  document.getElementById('quiz-meta').innerText=`${grades[currentGradeIdx]} • Trial ${currentTrial} • ${done}/${total} Answered`;
  // Update live score
  const scoreBox=document.getElementById('live-score-box');
  const livePct=document.getElementById('live-pct');
  const liveFrac=document.getElementById('live-fraction');
  scoreBox.style.display='block';
  livePct.innerText=pct+'%';
  liveFrac.innerText=`${correctCount} correct of ${done} answered`;
  livePct.style.color=pct>=70?'#34c759':pct>=50?'var(--accent)':'#ff3b30';
  if(done===total)showScore();
}
function getQuestions(){
  const gk=gradeKey(currentGradeIdx);
  return questionBank[gk][currentTrial];
}
function showScore(){
  const questions=getQuestions();
  let correct=0;
  questions.forEach((q,i)=>{if(userAnswers[i]?.chosen===q.ans)correct++;});
  const wrong=questions.length-correct;
  const pct=Math.round(correct/questions.length*100);
  document.getElementById('score-val').innerText=`${correct}/${questions.length}`;
  document.getElementById('stat-correct').innerText=correct;
  document.getElementById('stat-wrong').innerText=wrong;
  document.getElementById('stat-pct').innerText=pct+'%';
  document.getElementById('score-msg').innerText=pct>=80?'Excellent Work! Outstanding Performance.':pct>=60?'Good Effort — Keep Practising!':'Keep Going — You Can Improve!';
  const panel=document.getElementById('score-panel');
  panel.style.display='block';
  setTimeout(()=>panel.scrollIntoView({behavior:'smooth'}),100);
}
function closeQuiz(){
  document.getElementById('quiz-overlay').style.display='none';
  document.body.style.overflow='auto';
}
window.onload=()=>{initNav();renderGrid();};
</script>
