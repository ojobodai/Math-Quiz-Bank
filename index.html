<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Basic 8 Mathematics Quiz</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap');

  :root {
    --bg: #0d0f14;
    --card: #161a23;
    --border: #252b38;
    --accent: #f0c040;
    --accent2: #3ecfcf;
    --correct: #2dca73;
    --wrong: #e84a5f;
    --text: #e8eaf0;
    --muted: #6b7280;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* TOP BAR */
  #topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 28px;
    gap: 20px;
  }
  #topbar h1 {
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.04em;
    white-space: nowrap;
  }
  .bar-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .stat-box {
    text-align: center;
  }
  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.2rem;
    font-weight: 700;
  }
  #score-val { color: var(--accent2); }
  #pct-val { color: var(--accent); }
  #timer-val {
    color: var(--text);
    font-variant-numeric: tabular-nums;
    transition: color 0.3s;
  }
  #timer-val.urgent { color: var(--wrong); animation: pulse 1s infinite; }

  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  /* PROGRESS BAR */
  #progress-wrap {
    height: 3px;
    background: var(--border);
    position: sticky;
    top: 61px;
    z-index: 99;
  }
  #progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--accent2), var(--accent));
    width: 0%;
    transition: width 0.4s ease;
  }

  /* MAIN */
  #main {
    max-width: 820px;
    margin: 0 auto;
    padding: 32px 20px 80px;
  }

  .section-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--accent2);
    margin: 36px 0 18px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* QUESTION CARD */
  .q-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 22px 24px;
    margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .q-card.answered { border-color: #2a3040; }

  .q-num {
    font-size: 0.7rem;
    font-weight: 600;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .q-text {
    font-size: 0.97rem;
    line-height: 1.6;
    color: var(--text);
    margin-bottom: 16px;
  }

  /* OPTIONS */
  .options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }
  @media (max-width: 520px) {
    .options { grid-template-columns: 1fr; }
  }

  .opt-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    background: transparent;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    text-align: left;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.9rem;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    position: relative;
    overflow: hidden;
  }
  .opt-btn:not(.locked):hover {
    border-color: var(--accent2);
    background: rgba(62,207,207,0.06);
    transform: translateY(-1px);
  }
  .opt-btn .opt-letter {
    min-width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.72rem;
    font-weight: 700;
    font-family: 'Syne', sans-serif;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
  }
  .opt-btn .opt-text { flex: 1; line-height: 1.4; }

  /* LOCKED states */
  .opt-btn.locked { cursor: not-allowed; }
  .opt-btn.selected-correct {
    border-color: var(--correct);
    background: rgba(45,202,115,0.1);
  }
  .opt-btn.selected-correct .opt-letter {
    background: var(--correct);
    color: #0d0f14;
  }
  .opt-btn.selected-wrong {
    border-color: var(--wrong);
    background: rgba(232,74,95,0.1);
  }
  .opt-btn.selected-wrong .opt-letter {
    background: var(--wrong);
    color: #fff;
  }
  .opt-btn.show-correct {
    border-color: var(--correct);
    background: rgba(45,202,115,0.06);
  }
  .opt-btn.show-correct .opt-letter {
    background: var(--correct);
    color: #0d0f14;
  }

  /* RESULT SCREEN */
  #result-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 80vh;
    text-align: center;
    padding: 40px 20px;
  }
  #result-screen.visible { display: flex; }
  #main.hidden { display: none; }

  .result-circle {
    width: 160px;
    height: 160px;
    border-radius: 50%;
    background: conic-gradient(var(--accent) 0%, transparent 0%);
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 28px;
    position: relative;
  }
  .result-circle::before {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: var(--bg);
  }
  .result-pct-text {
    position: relative;
    z-index: 1;
    font-family: 'Syne', sans-serif;
    font-size: 2.4rem;
    font-weight: 800;
    color: var(--accent);
  }
  .result-title {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 8px;
  }
  .result-sub {
    font-size: 1rem;
    color: var(--muted);
    margin-bottom: 32px;
  }
  .result-grade {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    padding: 10px 28px;
    border-radius: 50px;
    margin-bottom: 28px;
  }
  .result-stats {
    display: flex;
    gap: 28px;
    margin-bottom: 36px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .rs-box {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 24px;
    min-width: 110px;
  }
  .rs-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.6rem;
    font-weight: 800;
  }
  .rs-lbl { font-size: 0.75rem; color: var(--muted); margin-top: 2px; }

  .retry-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 13px 36px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
  }
  .retry-btn:hover { opacity: 0.85; transform: translateY(-1px); }

  /* SUBMIT */
  #submit-wrap {
    text-align: center;
    margin-top: 36px;
  }
  #submit-btn {
    background: var(--accent);
    color: #0d0f14;
    border: none;
    border-radius: 8px;
    padding: 14px 48px;
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.15s;
    letter-spacing: 0.04em;
  }
  #submit-btn:hover { opacity: 0.85; transform: translateY(-2px); }
  #submit-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .answered-indicator {
    font-size: 0.75rem;
    color: var(--muted);
    margin-top: 10px;
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <h1>📐 Basic 8 Mathematics</h1>
  <div class="bar-stats">
    <div class="stat-box">
      <div class="stat-label">Score</div>
      <div class="stat-value" id="score-val">0 / 60</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Percentage</div>
      <div class="stat-value" id="pct-val">0%</div>
    </div>
    <div class="stat-box">
      <div class="stat-label">Time Left</div>
      <div class="stat-value" id="timer-val">60:00</div>
    </div>
  </div>
</div>
<div id="progress-wrap"><div id="progress-bar"></div></div>

<!-- QUIZ MAIN -->
<div id="main">
  <div id="questions-container"></div>
  <div id="submit-wrap">
    <button id="submit-btn" onclick="submitQuiz()">Submit Quiz</button>
    <div class="answered-indicator" id="answered-count">0 of 60 answered</div>
  </div>
</div>

<!-- RESULT SCREEN -->
<div id="result-screen">
  <div class="result-circle" id="result-circle">
    <div class="result-pct-text" id="result-pct">0%</div>
  </div>
  <div class="result-title" id="result-title">Quiz Complete!</div>
  <div class="result-sub" id="result-sub">Here's how you did</div>
  <div class="result-grade" id="result-grade"></div>
  <div class="result-stats">
    <div class="rs-box"><div class="rs-val" id="rs-correct" style="color:var(--correct)">0</div><div class="rs-lbl">Correct</div></div>
    <div class="rs-box"><div class="rs-val" id="rs-wrong" style="color:var(--wrong)">0</div><div class="rs-lbl">Wrong</div></div>
    <div class="rs-box"><div class="rs-val" id="rs-skipped" style="color:var(--muted)">0</div><div class="rs-lbl">Skipped</div></div>
    <div class="rs-box"><div class="rs-val" id="rs-time" style="color:var(--accent2)">-</div><div class="rs-lbl">Time Used</div></div>
  </div>
  <button class="retry-btn" onclick="retryQuiz()">🔁 Try Again</button>
</div>

<script>
const QUESTIONS = [
  // ── SECTION A (original 40 with changed values) ──
  {
    q: "Which of the following is equivalent to 3/4?",
    opts: ["A. 6/10", "B. 9/12", "C. 5/8", "D. 10/16"],

  },

  },
  {
    q: "In a right-angled triangle, if the two shorter sides are 6 cm and 8 cm, the hypotenuse is:",

  {

  },
  {
    q: "Probability of a student passing is 0.65. Probability of failing as a fraction is:",
    opts: ["A. 13/20", "B. 7/20", "C. 3/5", "D. 2/5"],
    ans: "B"
  },
  {
    q: "Find the circumference of a circle whose area is 616 cm². [π = 22/7]",
    opts: ["A. 44 cm", "B. 88 cm", "C. 77 cm", "D. 154 cm"],
    ans: "B"
  }
];

// Shuffle once at load
let shuffled = [...QUESTIONS];
let userAnswers = new Array(60).fill(null);
let timerInterval;
let totalSeconds = 60 * 60; // 60 min
let startTime;
let submitted = false;
let answeredCount = 0;

const letters = ["A","B","C","D"];

function buildQuiz() {
  const container = document.getElementById('questions-container');
  container.innerHTML = '';

  const section1 = document.createElement('div');
  section1.className = 'section-title';
  section1.textContent = 'Section A — Objective Test (Questions 1–40)';
  container.appendChild(section1);

  const section2Title = document.createElement('div');
  section2Title.id = 'section2-marker';

  shuffled.forEach((q, i) => {
    if (i === 40) {
      const s2 = document.createElement('div');
      s2.className = 'section-title';
      s2.textContent = 'Section B — Extended Objectives (Questions 41–60)';
      container.appendChild(s2);
    }

    const card = document.createElement('div');
    card.className = 'q-card';
    card.id = `card-${i}`;

    const qnum = document.createElement('div');
    qnum.className = 'q-num';
    qnum.textContent = `Question ${i + 1}`;

    const qtext = document.createElement('div');
    qtext.className = 'q-text';
    qtext.textContent = q.q;

    const optsDiv = document.createElement('div');
    optsDiv.className = 'options';

    q.opts.forEach((opt, oi) => {
      const btn = document.createElement('button');
      btn.className = 'opt-btn';
      btn.id = `q${i}-opt${oi}`;

      const letter = document.createElement('span');
      letter.className = 'opt-letter';
      letter.textContent = letters[oi];

      const text = document.createElement('span');
      text.className = 'opt-text';
      text.textContent = opt.substring(3); // remove "A. " etc

      btn.appendChild(letter);
      btn.appendChild(text);
      btn.onclick = () => selectAnswer(i, oi);
      optsDiv.appendChild(btn);
    });

    card.appendChild(qnum);
    card.appendChild(qtext);
    card.appendChild(optsDiv);
    container.appendChild(card);
  });
}

function selectAnswer(qIdx, optIdx) {
  if (submitted) return;
  if (userAnswers[qIdx] !== null) return; // locked — no changes

  userAnswers[qIdx] = optIdx;
  answeredCount++;

  // Lock all options for this question
  const card = document.getElementById(`card-${qIdx}`);
  const btns = card.querySelectorAll('.opt-btn');
  btns.forEach(b => b.classList.add('locked'));
  card.classList.add('answered');

  // Highlight selected
  const selectedBtn = document.getElementById(`q${qIdx}-opt${optIdx}`);
  const correctLetter = shuffled[qIdx].ans;
  const correctIdx = letters.indexOf(correctLetter);

  if (optIdx === correctIdx) {
    selectedBtn.classList.add('selected-correct');
  } else {
    selectedBtn.classList.add('selected-wrong');
    // Show correct
    document.getElementById(`q${qIdx}-opt${correctIdx}`).classList.add('show-correct');
  }

  // Update live score
  updateLiveScore();
  updateAnsweredCount();
}

function updateLiveScore() {
  let correct = 0;
  userAnswers.forEach((ans, i) => {
    if (ans !== null) {
      const correctIdx = letters.indexOf(shuffled[i].ans);
      if (ans === correctIdx) correct++;
    }
  });

  const pct = Math.round((correct / 60) * 100);
  document.getElementById('score-val').textContent = `${correct} / 60`;
  document.getElementById('pct-val').textContent = `${pct}%`;
  document.getElementById('progress-bar').style.width = `${(answeredCount / 60) * 100}%`;
}

function updateAnsweredCount() {
  document.getElementById('answered-count').textContent = `${answeredCount} of 60 answered`;
}

function startTimer() {
  startTime = Date.now();
  timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const remaining = totalSeconds - elapsed;

    if (remaining <= 0) {
      clearInterval(timerInterval);
      document.getElementById('timer-val').textContent = '00:00';
      submitQuiz(true);
      return;
    }

    const m = Math.floor(remaining / 60).toString().padStart(2, '0');
    const s = (remaining % 60).toString().padStart(2, '0');
    const timerEl = document.getElementById('timer-val');
    timerEl.textContent = `${m}:${s}`;

    if (remaining <= 300) {
      timerEl.classList.add('urgent');
    }
  }, 500);
}

function submitQuiz(autoSubmit = false) {
  if (submitted) return;
  submitted = true;
  clearInterval(timerInterval);

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const used_m = Math.floor(elapsed / 60).toString().padStart(2,'0');
  const used_s = (elapsed % 60).toString().padStart(2,'0');

  // Lock everything remaining
  for (let i = 0; i < 60; i++) {
    if (userAnswers[i] === null) {
      const card = document.getElementById(`card-${i}`);
      const btns = card.querySelectorAll('.opt-btn');
      btns.forEach(b => b.classList.add('locked'));
      // Reveal correct
      const correctIdx = letters.indexOf(shuffled[i].ans);
      document.getElementById(`q${i}-opt${correctIdx}`).classList.add('show-correct');
    }
  }

  // Count
  let correct = 0;
  userAnswers.forEach((ans, i) => {
    if (ans !== null) {
      const correctIdx = letters.indexOf(shuffled[i].ans);
      if (ans === correctIdx) correct++;
    }
  });
  const wrong = userAnswers.filter((a,i) => a !== null && a !== letters.indexOf(shuffled[i].ans)).length;
  const skipped = userAnswers.filter(a => a === null).length;
  const pct = Math.round((correct / 60) * 100);

  // Show result screen
  setTimeout(() => {
    document.getElementById('main').classList.add('hidden');
    const rs = document.getElementById('result-screen');
    rs.classList.add('visible');

    document.getElementById('result-pct').textContent = pct + '%';
    document.getElementById('rs-correct').textContent = correct;
    document.getElementById('rs-wrong').textContent = wrong;
    document.getElementById('rs-skipped').textContent = skipped;
    document.getElementById('rs-time').textContent = `${used_m}:${used_s}`;

    // Conic gradient for circle
    const circle = document.getElementById('result-circle');
    circle.style.background = `conic-gradient(#f0c040 ${pct}%, #252b38 ${pct}%)`;

    // Grade
    let grade, gradeColor;
    if (pct >= 80) { grade = '🏆 Excellent — A'; gradeColor = '#2dca73'; }
    else if (pct >= 70) { grade = '🎉 Very Good — B'; gradeColor = '#3ecfcf'; }
    else if (pct >= 60) { grade = '👍 Good — C'; gradeColor = '#f0c040'; }
    else if (pct >= 50) { grade = '📚 Average — D'; gradeColor = '#f0a030'; }
    else { grade = '⚠️ Needs Improvement — F'; gradeColor = '#e84a5f'; }

    const gradeEl = document.getElementById('result-grade');
    gradeEl.textContent = grade;
    gradeEl.style.background = gradeColor + '22';
    gradeEl.style.color = gradeColor;
    gradeEl.style.border = `1px solid ${gradeColor}55`;

    document.getElementById('result-title').textContent = autoSubmit ? "Time's Up!" : "Quiz Complete!";
    document.getElementById('result-sub').textContent = `You scored ${correct} out of 60`;
  }, 400);
}

function retryQuiz() {
  submitted = false;
  userAnswers = new Array(60).fill(null);
  answeredCount = 0;
  totalSeconds = 60 * 60;

  document.getElementById('result-screen').classList.remove('visible');
  document.getElementById('main').classList.remove('hidden');
  document.getElementById('score-val').textContent = '0 / 60';
  document.getElementById('pct-val').textContent = '0%';
  document.getElementById('timer-val').textContent = '60:00';
  document.getElementById('timer-val').classList.remove('urgent');
  document.getElementById('progress-bar').style.width = '0%';
  document.getElementById('answered-count').textContent = '0 of 60 answered';

  buildQuiz();
  startTimer();
  window.scrollTo(0,0);
}

// INIT
buildQuiz();
startTimer();
</script>
</body>
</html>
